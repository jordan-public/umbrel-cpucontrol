<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrel CPU Control</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #888888;
            --primary: #bb86fc;
            --danger: #cf6679;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .temp-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            transition: color 0.3s;
        }

        .temp-label {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-label {
            font-size: 16px;
            font-weight: 500;
        }

        .control-value {
            font-size: 14px;
            color: var(--primary);
            font-weight: bold;
        }

        /* Slider */
        input[type=range] {
            width: 100%;
            margin: 10px 0;
            background-color: transparent;
            -webkit-appearance: none;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            background: #333;
            border: 0;
            border-radius: 4px;
            width: 100%;
            height: 8px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            margin-top: -6px;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Example Code blocks */
        .example-block {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }
        .example-block code {
            font-family: monospace;
            color: #4af626;
            word-break: break-all;
            display: block;
            margin-bottom: 10px;
        }
        .example-actions {
            display: flex;
            gap: 10px;
        }
        .example-btn {
            background: #333;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .example-btn:hover {
            background: #444;
        }
        .example-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>CPU Control</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('main')">Main</button>
        <button class="tab-btn" onclick="switchTab('advanced')">Advanced</button>
    </div>

    <div id="tab-main" class="tab-content active">
        <div class="stat-card" style="display: flex; justify-content: space-around; align-items: center;">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div style="display: flex; align-items: center; justify-content: center;">
                    <div class="temp-display" id="tempDisplay">--</div>
                    <div class="unit-toggle" style="display: flex; align-items: center; margin-left: 10px;">
                        <span style="font-size: 14px; font-weight: bold; margin-right: 5px;">°C</span>
                        <label class="switch">
                            <input type="checkbox" id="unitToggle">
                            <span class="slider"></span>
                        </label>
                        <span style="font-size: 14px; font-weight: bold; margin-left: 5px;">°F</span>
                    </div>
                </div>
                <div class="temp-label">Temperature</div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="temp-display" id="loadDisplay">--%</div>
                <div class="temp-label">CPU Load</div>
            </div>
        </div>

    <div class="control-group">
        <div class="control-header">
            <span class="control-label">Turbo Boost</span>
            <label class="switch">
                <input type="checkbox" id="turboToggle">
                <span class="slider" id="turboSlider"></span>
            </label>
        </div>
        <div class="temp-label" id="turboWarning" style="display:none; color: var(--danger); margin-top: 10px;">Not supported on this CPU</div>
    </div>

    <div class="control-group">
        <div class="control-header">
            <span class="control-label">CPU Throttling</span>
            <span class="control-value" id="throttleValue">100%</span>
        </div>
        <input type="range" id="throttleSlider" min="10" max="100" value="100" step="1">
    </div>
    </div> <!-- end tab-main -->

    <div id="tab-advanced" class="tab-content">
        <div class="control-group">
            <div class="control-header">
                <span class="control-label">API Access</span>
                <label class="switch">
                    <input type="checkbox" id="apiToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="temp-label" style="text-transform: none; margin-top: 10px; color: var(--text-muted);">
                Enable programmatic access to the CPU Control API over your local network.
            </div>
        </div>

        <h2 style="font-size: 18px; margin-top: 0;">API Examples</h2>
        
        <div class="example-block">
            <div class="example-title">Read CPU Status</div>
            <code id="code-get"></code>
            <div class="example-actions">
                <button class="example-btn" onclick="copyCode('code-get')">Copy</button>
                <button class="example-btn" onclick="tryGet()">Try in new window</button>
            </div>
        </div>

        <div class="example-block">
            <div class="example-title">Set CPU Throttling (e.g., 50%)</div>
            <code id="code-post-throttle"></code>
            <div class="example-actions">
                <button class="example-btn" onclick="copyCode('code-post-throttle')">Copy</button>
            </div>
        </div>

        <div class="example-block">
            <div class="example-title">Set Turbo Boost (e.g., ON)</div>
            <code id="code-post-turbo"></code>
            <div class="example-actions">
                <button class="example-btn" onclick="copyCode('code-post-turbo')">Copy</button>
            </div>
        </div>
    </div> <!-- end tab-advanced -->

    <div id="versionDisplay" style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 20px;">v--</div>
</div>

<script>
    const UI_TOKEN = '__UI_TOKEN__';

    const tempDisplay = document.getElementById('tempDisplay');
    const loadDisplay = document.getElementById('loadDisplay');
    const unitToggle = document.getElementById('unitToggle');
    const turboToggle = document.getElementById('turboToggle');
    const turboSlider = document.getElementById('turboSlider');
    const turboWarning = document.getElementById('turboWarning');
    const throttleSlider = document.getElementById('throttleSlider');
    const throttleValue = document.getElementById('throttleValue');
    
    const apiToggle = document.getElementById('apiToggle');
    const app = document.getElementById('app');

    let currentSettings = {
        turboboost: true,
        throttling: 100,
        apiEnabled: false,
        tempUnit: 'C'
    };

    let isUpdating = false;

    // Set dynamic API URLs based on current host
    const apiBaseUrl = window.location.protocol + "//" + window.location.hostname + ":3000";
    document.getElementById('code-get').innerText = `curl ${apiBaseUrl}/api/status`;
    document.getElementById('code-post-throttle').innerText = `curl -X POST ${apiBaseUrl}/api/settings \\\n  -H "Content-Type: application/json" \\\n  -d '{"throttling": 50}'`;
    document.getElementById('code-post-turbo').innerText = `curl -X POST ${apiBaseUrl}/api/settings \\\n  -H "Content-Type: application/json" \\\n  -d '{"turboboost": true}'`;

    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');
    }

    function copyCode(id) {
        const text = document.getElementById(id).innerText;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        } else {
            // Fallback for non-HTTPS (like local Umbrel IPs)
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Copied to clipboard!");
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
            document.body.removeChild(textArea);
        }
    }

    function tryGet() {
        window.open(`${apiBaseUrl}/api/status?uiToken=${encodeURIComponent(UI_TOKEN)}`, '_blank');
    }

    function setUnit(unit) {
        currentSettings.tempUnit = unit;
        unitToggle.checked = (unit === 'F');
        isUpdating = true;
        saveSettings({
            ...currentSettings,
            tempUnit: unit
        }).finally(() => {
            isUpdating = false;
            fetchStatus(); // re-render immediate
        }).catch(() => {});
    }

    function interpolateColor(p) {
        let r, g, b;
        if (p < 0.5) {
            const p2 = p * 2;
            r = Math.round(76 + (255 - 76) * p2);
            g = Math.round(175 + (193 - 175) * p2);
            b = Math.round(80 + (7 - 80) * p2);
        } else {
            const p2 = (p - 0.5) * 2;
            r = Math.round(255 + (244 - 255) * p2);
            g = Math.round(193 + (67 - 193) * p2);
            b = Math.round(7 + (54 - 7) * p2);
        }
        return `rgb(${r}, ${g}, ${b})`;
    }

    function updateColors(tempC, load) {
        let tp = (tempC - 60) / (100 - 60);
        tp = Math.max(0, Math.min(1, tp));
        tempDisplay.style.color = interpolateColor(tp);

        let lp = (load - 30) / (100 - 30);
        lp = Math.max(0, Math.min(1, lp));
        loadDisplay.style.color = interpolateColor(lp);
    }

    async function fetchStatusData() {
        const res = await fetch('/api/status', {
            headers: { 'X-UI-Token': UI_TOKEN }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Status request failed: ${res.status}`);
        if (data.error) throw new Error(data.error);
        return data;
    }

    async function fetchStatus() {
        try {
            const data = await fetchStatusData();
            
            if (data.version) {
                document.getElementById('versionDisplay').innerText = 'v' + data.version;
            }

            const isF = data.tempUnit === 'F';
            const displayTemp = isF ? (data.temperature * 9/5 + 32) : data.temperature;
            tempDisplay.innerText = displayTemp.toFixed(1);
            loadDisplay.innerText = (data.load || 0).toFixed(1) + '%';
            
            updateColors(data.temperature, data.load || 0);

            if (!data.turboSupported) {
                turboToggle.disabled = true;
                turboSlider.style.backgroundColor = '#555';
                turboWarning.style.display = 'block';
            }

            // Only update controls if user isn't currently interacting
            if (!isUpdating) {
                if (data.turboSupported && document.activeElement !== turboToggle) {
                    turboToggle.checked = data.turboboost;
                }
                
                if (document.activeElement !== throttleSlider) {
                    throttleSlider.value = data.throttling;
                    throttleValue.innerText = data.throttling + '%';
                }
                
                if (document.activeElement !== apiToggle) {
                    apiToggle.checked = data.apiEnabled;
                }

                if (document.activeElement !== unitToggle) {
                    unitToggle.checked = (data.tempUnit === 'F');
                }

                currentSettings = {
                    turboboost: data.turboboost,
                    throttling: data.throttling,
                    apiEnabled: data.apiEnabled,
                    tempUnit: data.tempUnit || 'C'
                };
            }
        } catch (err) {
            console.error('Failed to fetch status:', err);
        }
    }

    async function saveSettings(settings) {
        try {
            app.classList.add('loading');
            const res = await fetch('/api/settings', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-UI-Token': UI_TOKEN
                },
                body: JSON.stringify(settings)
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data.error) {
                throw new Error(data.error || `Settings request failed: ${res.status}`);
            }
            currentSettings = { ...settings };
        } catch (err) {
            console.error('Failed to save settings:', err);
            throw err;
        } finally {
            app.classList.remove('loading');
        }
    }

    // Event Listeners
    turboToggle.addEventListener('change', (e) => {
        isUpdating = true;
        saveSettings({
            ...currentSettings,
            turboboost: e.target.checked
        }).finally(() => isUpdating = false).catch(() => {});
    });

    throttleSlider.addEventListener('input', (e) => {
        throttleValue.innerText = e.target.value + '%';
    });

    throttleSlider.addEventListener('change', (e) => {
        isUpdating = true;
        saveSettings({
            ...currentSettings,
            throttling: parseInt(e.target.value, 10)
        }).finally(() => isUpdating = false).catch(() => {});
    });

    apiToggle.addEventListener('change', (e) => {
        isUpdating = true;
        saveSettings({
            ...currentSettings,
            apiEnabled: e.target.checked
        }).finally(() => isUpdating = false).catch(() => {});
    });

    unitToggle.addEventListener('change', (e) => {
        const newUnit = e.target.checked ? 'F' : 'C';
        setUnit(newUnit);
    });

    // Initial fetch and polling
    fetchStatus();
    setInterval(fetchStatus, 5000);
</script>

</body>
</html>
