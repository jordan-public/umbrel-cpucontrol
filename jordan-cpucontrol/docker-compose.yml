version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jordan-cpucontrol_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "true"
      PROXY_AUTH_WHITELIST: "/api/*"

  web:
    image: jordanst/cpucontrol:1.0.28
    restart: on-failure
    volumes:
      - /sys:/sys
      - ${APP_DATA_DIR}/data:/usr/src/app/data
    privileged: true
    environment:
      - PORT=80
      - DATA_DIR=/usr/src/app/data
